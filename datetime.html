<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex: align-items: center; justify-content: center; height: 100vh; font-family:sans-serif; font-size: 1.4rem; }
  </style>
</head>
<body>
  <div id="clock"></div>
  <script>
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleString();
    }
    setInterval(updateClock, 1000)
    updateClock();
  </script>
</body>
</html>
